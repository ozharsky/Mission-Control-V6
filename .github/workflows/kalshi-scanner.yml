name: Kalshi Scanner

on:
  schedule:
    # Run every hour
    - cron: '0 * * * *'
  workflow_dispatch:
    # Allow manual trigger

jobs:
  scan:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install dependencies
      run: npm install node-fetch@2
      
    - name: Run Kalshi Scanner
      run: node kalshi-scanner-v5.8.js
      
    - name: Commit scan results
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add kalshi_data/
        git diff --staged --quiet || git commit -m "Kalshi scan results - $(date -u)"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
