name: Kalshi Scanner v2 to Firebase

# Note: Node.js 20 deprecation warning (June 2026)
# GitHub will auto-migrate to Node.js 24 - no action needed
# See: https://github.blog/changelog/2025-09-19-deprecation-of-node-20/

on:
  schedule:
    # Run every 5 minutes for more frequent price updates
    - cron: '*/5 * * * *'
    # Run resolution fetcher every 6 hours to check for resolved markets
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install dependencies
      run: |
        npm install firebase-admin ws
        
    - name: Resolve Brier Predictions
      run: node scripts/kalshi-resolution-fetcher.cjs --days=7
      env:
        KALSHI_ACCESS_KEY: ${{ secrets.KALSHI_API_KEY }}
        KALSHI_API_KEY: ${{ secrets.KALSHI_API_KEY }}
        
    - name: Run Kalshi Trade Fetcher v2
      run: node scripts/kalshi-trade-fetcher-v2.cjs
      env:
        FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
        FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        KALSHI_API_KEY: ${{ secrets.KALSHI_API_KEY }}
        KALSHI_PRIVATE_KEY: ${{ secrets.KALSHI_PRIVATE_KEY }}
        
    - name: Commit scan results
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add kalshi_data/ || true
        git diff --staged --quiet || git commit -m "Kalshi scan v2 - $(date -u)"
        git push || true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
